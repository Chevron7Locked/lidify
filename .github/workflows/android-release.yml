name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Remove 'v' prefix for version code
          VERSION_NAME="${VERSION#v}"
          # Create version code from version (e.g., 1.2.3 -> 10203)
          VERSION_CODE=$(echo $VERSION_NAME | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Update version in build.gradle
        working-directory: frontend/android/app
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.version_code }}/" build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.version_name }}\"/" build.gradle

      - name: Create Capacitor shell
        working-directory: frontend
        run: |
          mkdir -p out
          cat > out/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
              <title>Lidify</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      background: #000;
                      color: #fff;
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                  }
                  .loader { text-align: center; }
                  .spinner {
                      width: 48px; height: 48px;
                      border: 3px solid #333;
                      border-top-color: #ecb200;
                      border-radius: 50%;
                      animation: spin 1s linear infinite;
                      margin: 0 auto 16px;
                  }
                  @keyframes spin { to { transform: rotate(360deg); } }
                  .text { color: #888; font-size: 14px; }
              </style>
          </head>
          <body>
              <div class="loader">
                  <div class="spinner"></div>
                  <p class="text">Connecting to server...</p>
              </div>
          </body>
          </html>
          EOF

      - name: Sync Capacitor
        working-directory: frontend
        run: |
          # Set production mode (no dev server)
          export NODE_ENV=production
          npx cap sync android

      - name: Configure AndroidX
        working-directory: frontend/android
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx1536m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Generate Android assets
        working-directory: frontend
        run: npx capacitor-assets generate --android

      - name: Build Release APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Decode keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          
          # Sign the APK
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --key-pass pass:$KEY_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --out app/build/outputs/apk/release/lidify-${{ steps.version.outputs.version }}.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          
          # Clean up keystore
          rm keystore.jks

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            frontend/android/app/build/outputs/apk/release/lidify-${{ steps.version.outputs.version }}.apk
          fail_on_unmatched_files: false
